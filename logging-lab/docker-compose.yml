services:
  db:
    image: postgres:16-alpine
    container_name: wal-learning
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
      - ./data:/data:ro
volumes:
  pgdata:

